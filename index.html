<html>
<head>
<title> Online Calculator </title>
<style>
.calbuttons{

width: 212px;
border-width: 3px;
border-style: solid;
margin-left: auto;
margin-right: auto;
margin-top:350px;
}





.buttons{
    width: 50px;
    height: 50px;
    background-color: antiquewhite;
    border-color:aliceblue;
    border-width: 2px;
    border-radius: 5px;
    margin-block: 1px;
}
</style>
</head>




<body style="background-color:rgba(107, 194, 235, 0.644)">
    <div class="calbuttons" >
        <input type="text" class="Screen" style="width: 212px; height: 40px; text-align-last: right;" value="0" >
        
        <br>
        <input type="button" value="(" class="buttons">
        <input type="button" value=")" class="buttons">
        <input type="button" value="%" class="buttons">
        <input type="button" value="AC" class="buttons">
        <br>     
        <input type="button" value="7" class="buttons">
        <input type="button" value="8" class="buttons">
        <input type="button" value="9" class="buttons">
        <input type="button" value="Del" class="buttons">
        <br>
        <input type="button" value="4" class="buttons">
        <input type="button" value="5" class="buttons">
        <input type="button" value="6" class="buttons">
        <input type="button" value="X" class="buttons">
        <br>
        <input type="button" value="1" class="buttons">
        <input type="button" value="2" class="buttons">
        <input type="button" value="3" class="buttons">
        <input type="button" value="-" class="buttons">
        <br>
        <input type="button" value="0" class="buttons">
        <input type="button" value="." class="buttons">
        <input type="button" value="=" class="buttons">
         <input type="button" value="+" class="buttons">
    </div>
</body>

</html>
