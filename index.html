<html>
<head>
<title> Online Calculator </title>
<style>
.calbuttons{
margin-left: auto;
margin-right: auto;
display: block;
flex-wrap: wrap-reverse;

}

.buttons{
    width: 90px;
    height: 90px;
    background-color: antiquewhite;
    border-color:aliceblue;
    border-width: 2px;
    border-radius: 5px;
    margin-block: 1px;
    
}

#displays{
font-size:xx-large;
}

#div1{
border-style: solid;
width: fit-content;
height:fit-content;
}

</style>

<script>
const display = document.getElementById("displays");

function ValueAppend(input)
{
    displays.value += input;
    
}

function ClearValues()
{
    displays.value =" ";
}

function calculate()
{
     try{
        displays.value = eval(displays.value);
    }
    catch(error){
        displays.value = "Error";
    }
}

function DeleteValue()
{
   displays.value = displays.value.slice(0, -1);
}

function Squareapplied(){
    displays.value *= displays.value;
}

</script>

</head>
<div style="text-align: center;">
<h1> Online Calculator </h1>
<p> Your Online Calculator for your mathematical needs</p>
</div>


<body style="background-color:rgba(107, 194, 235, 0.644)">
<div id="div1">
    <div class="calbuttons" >
        <input id="displays" readonly type="text" class="Screen" placeholder="0" style="width: 372px; height: 140px; text-align-last: right;">
        <br> 
        <input type="button" value="sqr" class="buttons"onclick="Squareapplied()"> 
        <input type="button" value="%" class="buttons" onclick="ValueAppend('%')">
        <input type="button" value="Del" class="buttons" onclick=" DeleteValue()">
        <input type="button" value="AC" class="buttons" onclick="ClearValues()">
        <br>     
        <input type="button" value="7" class="buttons" onclick="ValueAppend('7')">
        <input type="button" value="8" class="buttons" onclick="ValueAppend('8')">
        <input type="button" value="9" class="buttons" onclick="ValueAppend('9')">
        <input type="button" value="X" class="buttons" onclick="ValueAppend('*')">
        
        <br>
        <input type="button" value="4" class="buttons"onclick="ValueAppend('4')">
        <input type="button" value="5" class="buttons" onclick="ValueAppend('5')">
        <input type="button" value="6" class="buttons" onclick="ValueAppend('6')">
        <input type="button" value="-" class="buttons" onclick="ValueAppend('-')">
        <br>
        <input type="button" value="1" class="buttons" onclick="ValueAppend('1')">
        <input type="button" value="2" class="buttons" onclick="ValueAppend('2')">
        <input type="button" value="3" class="buttons" onclick="ValueAppend('3')">
        <input type="button" value="+" class="buttons" onclick="ValueAppend('+')">
        <br>
        <input type="button" value="0" class="buttons" onclick="ValueAppend('0')">
        <input type="button" value="." class="buttons" onclick="ValueAppend('.')">
        <input type="button" value="=" class="buttons" onclick="calculate()">
        
    </div>
</div>
</body>

</html>
